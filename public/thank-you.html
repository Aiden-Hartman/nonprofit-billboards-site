<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank you</title>
    <style>
      :root {
        --navy: #0f1f33;
        --muted: #637083;
        --line: #dde5ee;
        --section: #f4f7fa;
        --accent: #24746f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: var(--section);
        color: var(--navy);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(620px, calc(100% - 32px));
        padding: clamp(28px, 6vw, 48px);
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #ffffff;
        box-shadow: 0 18px 48px rgba(15, 31, 51, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 6vw, 3rem);
        line-height: 1.1;
      }

      p {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background: var(--accent);
        color: #ffffff;
        padding: 11px 18px;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Thank you</h1>
      <p>We received your inquiry and will follow up shortly.</p>
      <a href="/">Back to homepage</a>
    </main>
  </body>
</html>
