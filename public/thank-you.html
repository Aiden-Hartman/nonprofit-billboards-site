<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | Mission Billboards</title>
    <style>
      :root {
        --navy: #102033;
        --muted: #5d6b7d;
        --section: #f4f6f8;
        --accent: #2f8f83;
        --line: #d9e0e8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: var(--section);
        color: var(--navy);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(720px, calc(100% - 32px));
        padding: clamp(34px, 7vw, 64px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 24px 70px rgba(16, 32, 51, 0.12);
      }

      .eyebrow {
        margin: 0 0 14px;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.12em;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(2.3rem, 8vw, 4.2rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 1.08rem;
        line-height: 1.65;
      }

      a {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background: var(--accent);
        color: #ffffff;
        padding: 13px 20px;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Inquiry received</p>
      <h1>Thank you for reaching out.</h1>
      <p>
        Your campaign inquiry has been received. We will review the details and follow up about market options, timing, and next steps.
      </p>
      <a href="/">Return to site</a>
    </main>
  </body>
</html>
